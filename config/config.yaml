# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.4.0
# ═══════════════════════════════════════════════════════════════

# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: true
  preset: "always_on"

# ===============================================================
# 2. 数据源 - 热榜平台
# ===============================================================
platforms:
  enabled: true                         # ✅ 已开启
  api_url: ""
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "douyin"
      name: "抖音"
    - id: "weibo"
      name: "微博"
    - id: "tieba"
      name: "贴吧"
    - id: "zhihu"
      name: "知乎"
    - id: "coolapk"
      name: "酷安"
    - id: "github-trending-today"
      name: "GitHub趋势"
    - id: "linuxdo-hot"
      name: "Linux热榜"
    - id: "xueqiu"
      name: "雪球"
    - id: "kuaishou"
      name: "快手"  

# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    - id: "36kr"
      name: "36氪"
      url: "https://36kr.com/feed"
    - id: "sspai"
      name: "少数派"
      url: "https://sspai.com/feed"
    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "https://www.ruanyifeng.com/blog/atom.xml"
    - id: "huxiu"
      name: "虎嗅网"
      url: "https://www.huxiu.com/rss/0.xml"
    - id: "v2ex"
      name: "V2EX"
      url: "https://v2ex.com/index.xml"
    - id: "meituan"
      name: "美团技术团队"
      url: "https://tech.meituan.com/feed"
    - id: "yystv"
      name: "游戏研究社"
      url: "https://www.yystv.cn/rss/feed"
    - id: "coolshell"
      name: "酷壳"
      url: "http://coolshell.cn/feed"
    - id: "infzm"
      name: "南方周末"
      url: "https://rsshub.app/infzm/2"
    - id: "zaobao-world"
      name: "联合早报-国际即时"
      url: "https://plink.anyfeeder.com/zaobao/realtime/world"
    - id: "zaobao-china"
      name: "联合早报-中港台即时"
      url: "https://rsshub.app/zaobao/realtime/china"
    - id: "chinadaily-china"
      name: "中国日报-时政"
      url: "https://plink.anyfeeder.com/chinadaily/china"
    - id: "chinadaily-dual"
      name: "中国日报-双语新闻"
      url: "https://plink.anyfeeder.com/chinadaily/dual"
    - id: "ithome-ranking"
      name: "IT之家-24小时最热"
      url: "https://rsshub.app/ithome/ranking/24h"
    - id: "mittrchina"
      name: "麻省理工科技评论-热榜"
      url: "https://plink.anyfeeder.com/mittrchina/hot"
    - id: "hellogithub"
      name: "HelloGitHub月刊"
      url: "http://hellogithub.com/rss"
    - id: "droidyue"
      name: "技术小黑屋"
      url: "https://droidyue.com/atom.xml"
    - id: "wallstreetcn"
      name: "华尔街见闻"
      url: "https://plink.anyfeeder.com/weixin/wallstreetcn"
    - id: "fortunechina"
      name: "财富中文网"
      url: "https://plink.anyfeeder.com/fortunechina"
    - id: "cbnweekly"
      name: "第一财经周刊"
      url: "https://plink.anyfeeder.com/weixin/CBNweekly2008"
    - id: "iceo"
      name: "中国企业杂志"
      url: "https://plink.anyfeeder.com/weixin/iceo-com-cn"
    - id: "idaily"
      name: "iDaily每日环球视野"
      url: "https://plink.anyfeeder.com/daily/today"
    - id: "weibo-hot"
      name: "微博热搜榜"
      url: "https://rsshub.app/weibo/search/hot"
    - id: "tw93-weekly"
      name: "电源周刊"
      url: "https://weekly.tw93.fun/rss.xml"
    - id: "mingqinghistory"
      name: "历史研究社"
      url: "https://plink.anyfeeder.com/weixin/mingqinghistory"
    - id: "economist"
      name: "一天经济学人(双语)"
      url: "https://plink.anyfeeder.com/weixin/Economist_fans"

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "daily"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "ai"                     # 你确认AI配置没问题，保持不动
  priority_sort_enabled: true

# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    new_items: true      # ✅ 已开启
    hotlist: true        # ✅ 已开启
    rss: true            # ✅ 已开启
    standalone: false     # ✅ 已开启
    ai_analysis: true    # ✅ 已开启
  standalone:
    platforms: ["zhihu","wallstreetcn-hot","toutiao","baidu","thepaper","cls-hot","bilibili-hot-search","ifeng","weibo","douyin","tieba"]
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"
  api_key: ""
  api_base: "https://token.sensenova.cn/v1/chat/completions"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: false
  include_standalone: true
  include_rank_timeline: true

# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
